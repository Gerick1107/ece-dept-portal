# HTTPS-enabled nginx config for the ECE Portal frontend.
#
# Use this INSTEAD of nginx.conf when serving over TLS. Enable it by either:
#   (a) editing frontend/Dockerfile to copy this file to
#       /etc/nginx/conf.d/default.conf, or
#   (b) bind-mounting it over the default config in docker-compose.yml:
#         volumes:
#           - ./frontend/nginx.ssl.conf:/etc/nginx/conf.d/default.conf:ro
#           - ./certs:/etc/nginx/certs:ro
#       and publishing 443:  ports: ["443:443", "80:80"]
#
# Certs are expected at /etc/nginx/certs/fullchain.pem and privkey.pem.
# For quick network/self-signed certs run scripts/generate_self_signed_cert.sh.
# For a real domain, drop in a CA/Let's Encrypt certificate instead.

limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=10r/m;

# Redirect all plain HTTP to HTTPS.
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location ~ ^/api/v1/auth/login(/json)?$ {
        limit_req zone=login_limit burst=5 nodelay;
        proxy_pass http://backend:8000$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        limit_req zone=api_limit burst=40 nodelay;
        proxy_pass http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 30M;
        proxy_connect_timeout 75s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    location /health {
        proxy_pass http://backend:8000/health;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    location = /logo.png {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
