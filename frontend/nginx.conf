# Edge rate limiting (per client IP). Complements the app-level limiter in the
# backend and works across all backend workers. Included inside nginx http{}.
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=10r/m;

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Stricter throttle for the login endpoints (brute-force defence at the edge).
    location ~ ^/api/v1/auth/login(/json)?$ {
        limit_req zone=login_limit burst=5 nodelay;
        proxy_pass http://backend:8000$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        limit_req zone=api_limit burst=40 nodelay;
        proxy_pass http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 30M;
        # LLM generation (gpt-oss-120b reasoning / local 3B on CPU) can take minutes.
        # Defaults (60s read) cause 504s on long Insights/RAG calls; the local CPU
        # model in particular is slow, so allow a generous window.
        proxy_connect_timeout 75s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    location /health {
        proxy_pass http://backend:8000/health;
    }

    # Vite emits content-hashed filenames under /assets, so they can be cached
    # forever — a new build produces new names and busts the cache automatically.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # index.html and non-hashed public files (logo.png, favicon, etc.) keep the
    # same URL across builds, so force revalidation to avoid stale logos/assets.
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    location = /logo.png {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
