# Full-stack Docker deployment for ECE Automation Portal (NPortal).
# Use when the portal is ready for institute server hosting.

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change_root_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ece_dept_portal}
      MYSQL_USER: ${MYSQL_USER:-portal_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change_portal_password}
    ports:
      # Bind to localhost only so the DB isn't reachable beyond this machine.
      # Host port 3307 avoids clashing with a native MySQL on 3306.
      - "127.0.0.1:3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u${MYSQL_USER:-portal_user}", "-p${MYSQL_PASSWORD:-change_portal_password}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - portal

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      APP_ENV: production
      DEBUG: "false"
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: ${MYSQL_USER:-portal_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change_portal_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ece_dept_portal}
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in .env.docker}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      PORTAL_FRONTEND_URL: ${PORTAL_FRONTEND_URL:-http://localhost}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-admin@ece.iiitd.ac.in}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:?Set BOOTSTRAP_ADMIN_PASSWORD}
      ENABLE_SCHEDULER: ${ENABLE_SCHEDULER:-false}
      ENABLE_REQUIREMENT_REMINDERS: ${ENABLE_REQUIREMENT_REMINDERS:-true}
      REQUIREMENT_REMINDER_POLL_MINUTES: ${REQUIREMENT_REMINDER_POLL_MINUTES:-1}
      LOCAL_LLM_INSIGHTS_MAX_TOKENS: ${LOCAL_LLM_INSIGHTS_MAX_TOKENS:-2000}
      LOCAL_LLM_BASE_URL: ${LOCAL_LLM_BASE_URL:-http://host.docker.internal:11434/v1}
      LOCAL_LLM_MODEL: ${LOCAL_LLM_MODEL:-llama3.2:3b}
      # SDG auto-tagging for BTP/IP projects (local embeddings, no API key).
      ENABLE_SDG_LLM: ${ENABLE_SDG_LLM:-true}
      SDG_EMBEDDING_MODEL: ${SDG_EMBEDDING_MODEL:-BAAI/bge-large-en-v1.5}
      SDG_TOP_K: ${SDG_TOP_K:-5}
      SDG_REQUEST_DELAY_SECONDS: ${SDG_REQUEST_DELAY_SECONDS:-0.5}
      # Email (welcome mails, password reset, requirement reminders). Off unless creds set.
      SMTP_ENABLED: ${SMTP_ENABLED:-false}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      # Publications scraping. Needs SerpAPI keys; the container has no browser for scholarly.
      SCRAPER_BACKEND: ${SCRAPER_BACKEND:-serpapi}
      SERP_API_KEY: ${SERP_API_KEY:-}
      SERP_API_KEYS: ${SERP_API_KEYS:-}
      DATA_ASSETS: /data/assets
    extra_hosts:
      # Lets the container reach an Ollama instance running on the host machine.
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend/storage:/app/storage
      # Bind-mount the actual PDFs from the host so the container can read them.
      # The DB stores absolute paths from the ingesting machine; the app re-anchors
      # them under /app/documents at read time (see resolve_document_path).
      - ./backend/documents:/app/documents
      - ./data/assets:/data/assets
      - ./data/templates:/data/templates
      # Persist downloaded embedding models (SDG + RAG) across rebuilds.
      - hf_cache:/root/.cache
    networks:
      - portal

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: /api/v1
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${PORTAL_HTTP_PORT:-8080}:80"
    networks:
      - portal

volumes:
  mysql_data:
  hf_cache:

networks:
  portal:
    driver: bridge
